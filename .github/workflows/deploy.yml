name: Data Pipeline Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libre2-dev

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install databricks-cli snowflake-connector-python pytest boto3

      - name: Run Tests
        run: |
          echo "Skipping tests - Airflow not needed for file deployment"

      - name: Deploy Databricks Notebooks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace import_dir Databricks/Notebooks /Workspace/Shared/Capstone_final/Databricks/Notebooks --overwrite

      - name: Remove Old Databricks Python Files
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          for f in utils table_config checkpoint_manager bronze_engine silver_engine gold_engine cdc_engine; do
            echo "Deleting old variants of ${f} ..."

            curl --silent -X POST \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"path\": \"/Workspace/Shared/Capstone_final/Databricks/${f}\", \"recursive\": false}" \
              "https://$DATABRICKS_HOST/api/2.0/workspace/delete" || true

            curl --silent -X POST \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"path\": \"/Workspace/Shared/Capstone_final/Databricks/${f}.py\", \"recursive\": false}" \
              "https://$DATABRICKS_HOST/api/2.0/workspace/delete" || true

            curl --silent -X POST \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"path\": \"/Workspace/Shared/Capstone_final/Databricks/${f}.py.py\", \"recursive\": false}" \
              "https://$DATABRICKS_HOST/api/2.0/workspace/delete" || true

            curl --silent -X DELETE \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              "https://$DATABRICKS_HOST/api/2.0/fs/files/Shared/Capstone_final/Databricks/${f}.py" || true

            echo "  ✅ ${f} old versions removed"
          done

      - name: Deploy Databricks Python Files
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          BASE_PATH="Shared/Capstone_final/Databricks"

          for f in utils table_config checkpoint_manager bronze_engine silver_engine gold_engine cdc_engine; do
            echo "Uploading ${f}.py ..."
            curl --silent --show-error --fail \
              -X PUT \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"Databricks/${f}.py" \
              "https://$DATABRICKS_HOST/api/2.0/fs/files/${BASE_PATH}/${f}.py"
            echo "  ✅ ${f}.py uploaded"
          done

          echo ""
          echo "=== Verifying uploaded files ==="
          curl --silent \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            "https://$DATABRICKS_HOST/api/2.0/fs/directories/${BASE_PATH}" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
files = [f['path'] for f in data.get('contents', [])]
for f in files:
    print(f'  {f}')
"

      - name: Deploy Airflow DAGs to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY_BASE64: ${{ secrets.EC2_SSH_KEY_BASE64 }}
        run: |
          echo "$EC2_KEY_BASE64" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem

          ssh -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            $EC2_USER@$EC2_HOST \
            "mkdir -p ~/Capstone/airflow/dags ~/Capstone/airflow/plugins/operators"

          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/dags/batch_pipeline.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/dags/

          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/dags/live_merge.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/dags/

          rm ec2_key.pem
          echo "✅ DAGs deployed successfully"

      - name: Deploy Airflow Operators to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY_BASE64: ${{ secrets.EC2_SSH_KEY_BASE64 }}
        run: |
          echo "$EC2_KEY_BASE64" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem

          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/operators/databricks_operator.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/

          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/operators/sns_operator.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/

          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/plugins/__init__.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/

          rm ec2_key.pem
          echo "✅ Operators deployed successfully"

      - name: Run Snowflake SQL Scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python scripts/run_snowflake_sql.py
