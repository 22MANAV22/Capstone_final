name: Data Pipeline Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libre2-dev
      
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install databricks-cli snowflake-connector-python pytest boto3
      
      - name: Run Tests
        run: |
          echo "Skipping tests - Airflow not needed for file deployment"
      
      - name: Deploy Databricks Notebooks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace import_dir Databricks/Notebooks /Workspace/Shared/Capstone_final/Databricks/Notebooks --overwrite
      
      - name: Deploy Databricks Python Files
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Delete existing files first to avoid type mismatch
          databricks workspace delete /Workspace/Shared/Capstone_final/Databricks/utils.py || true
          databricks workspace delete /Workspace/Shared/Capstone_final/Databricks/table_config.py || true
          databricks workspace delete /Workspace/Shared/Capstone_final/Databricks/checkpoint_manager.py || true
          databricks workspace delete /Workspace/Shared/Capstone_final/Databricks/bronze_engine.py || true
          databricks workspace delete /Workspace/Shared/Capstone_final/Databricks/silver_engine.py || true
          databricks workspace delete /Workspace/Shared/Capstone_final/Databricks/gold_engine.py || true
          databricks workspace delete /Workspace/Shared/Capstone_final/Databricks/cdc_engine.py || true
          
          # Upload fresh files
          databricks workspace import Databricks/utils.py /Workspace/Shared/Capstone_final/Databricks/utils.py --language PYTHON --format SOURCE
          databricks workspace import Databricks/table_config.py /Workspace/Shared/Capstone_final/Databricks/table_config.py --language PYTHON --format SOURCE
          databricks workspace import Databricks/checkpoint_manager.py /Workspace/Shared/Capstone_final/Databricks/checkpoint_manager.py --language PYTHON --format SOURCE
          databricks workspace import Databricks/bronze_engine.py /Workspace/Shared/Capstone_final/Databricks/bronze_engine.py --language PYTHON --format SOURCE
          databricks workspace import Databricks/silver_engine.py /Workspace/Shared/Capstone_final/Databricks/silver_engine.py --language PYTHON --format SOURCE
          databricks workspace import Databricks/gold_engine.py /Workspace/Shared/Capstone_final/Databricks/gold_engine.py --language PYTHON --format SOURCE
          databricks workspace import Databricks/cdc_engine.py /Workspace/Shared/Capstone_final/Databricks/cdc_engine.py --language PYTHON --format SOURCE
      
      - name: Deploy Airflow DAGs to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY_BASE64: ${{ secrets.EC2_SSH_KEY_BASE64 }}
        run: |
          echo "$EC2_KEY_BASE64" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem
          
          # Create Astro directories if they don't exist
          echo "=== Creating Astro Airflow directories ==="
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $EC2_USER@$EC2_HOST "mkdir -p ~/Capstone/airflow/dags ~/Capstone/airflow/plugins/operators"
          
          # Deploy DAGs
          echo "=== Deploying DAGs ==="
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null Airflow/dags/batch_pipeline.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/dags/
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null Airflow/dags/live_merge.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/dags/
          rm ec2_key.pem
          echo "✅ DAGs deployed successfully"
      
      - name: Deploy Airflow Operators to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY_BASE64: ${{ secrets.EC2_SSH_KEY_BASE64 }}
        run: |
          echo "$EC2_KEY_BASE64" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null Airflow/operators/databricks_operator.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null Airflow/operators/sns_operator.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null Airflow/plugins/__init__.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/
          rm ec2_key.pem
          echo "✅ Operators deployed successfully"
      
      - name: Run Snowflake SQL Scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python scripts/run_snowflake_sql.py
