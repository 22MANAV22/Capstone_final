name: Data Pipeline Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libre2-dev
      
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install databricks-cli snowflake-connector-python pytest boto3
      
      - name: Run Tests
        run: |
          echo "Skipping tests - Airflow not needed for file deployment"
      
      - name: Deploy Databricks Notebooks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace import_dir Databricks/Notebooks /Workspace/Shared/Capstone_final/Databricks/Notebooks --overwrite

      - name: Deploy Databricks Python Files
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Helper function: upload a local .py file as a RAW plain Python file (not a notebook)
          # Uses the Workspace REST API with format=RAW so Databricks stores it as a .py file,
          # not a notebook object. base64-encodes the content and POSTs to /api/2.0/workspace/import.
          upload_py() {
            local LOCAL_PATH=$1       # e.g. Databricks/utils.py
            local REMOTE_PATH=$2      # e.g. /Workspace/Shared/.../utils.py  (include .py here for RAW)

            echo "Uploading $LOCAL_PATH → $REMOTE_PATH"

            CONTENT=$(base64 -w 0 "$LOCAL_PATH")

            RESPONSE=$(curl -s -o /tmp/db_response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              "$DATABRICKS_HOST/api/2.0/workspace/import" \
              -d "{
                \"path\": \"$REMOTE_PATH\",
                \"format\": \"RAW\",
                \"language\": \"PYTHON\",
                \"content\": \"$CONTENT\",
                \"overwrite\": true
              }")

            if [ "$RESPONSE" -ne 200 ]; then
              echo "❌ Failed to upload $LOCAL_PATH (HTTP $RESPONSE)"
              cat /tmp/db_response.json
              exit 1
            fi

            echo "✅ Uploaded $LOCAL_PATH successfully"
          }

          BASE=/Workspace/Shared/Capstone_final/Databricks

          upload_py Databricks/utils.py              $BASE/utils.py
          upload_py Databricks/table_config.py       $BASE/table_config.py
          upload_py Databricks/checkpoint_manager.py $BASE/checkpoint_manager.py
          upload_py Databricks/bronze_engine.py      $BASE/bronze_engine.py
          upload_py Databricks/silver_engine.py      $BASE/silver_engine.py
          upload_py Databricks/gold_engine.py        $BASE/gold_engine.py
          upload_py Databricks/cdc_engine.py         $BASE/cdc_engine.py

          echo "✅ All Python files deployed successfully"

      - name: Deploy Airflow DAGs to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY_BASE64: ${{ secrets.EC2_SSH_KEY_BASE64 }}
        run: |
          echo "$EC2_KEY_BASE64" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem
          
          echo "=== Creating Astro Airflow directories ==="
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $EC2_USER@$EC2_HOST \
            "mkdir -p ~/Capstone/airflow/dags ~/Capstone/airflow/plugins/operators"
          
          echo "=== Deploying DAGs ==="
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/dags/batch_pipeline.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/dags/
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/dags/live_merge.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/dags/
          rm ec2_key.pem
          echo "✅ DAGs deployed successfully"
      
      - name: Deploy Airflow Operators to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY_BASE64: ${{ secrets.EC2_SSH_KEY_BASE64 }}
        run: |
          echo "$EC2_KEY_BASE64" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/operators/databricks_operator.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/operators/sns_operator.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/
          scp -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            Airflow/plugins/__init__.py $EC2_USER@$EC2_HOST:~/Capstone/airflow/plugins/operators/
          rm ec2_key.pem
          echo "✅ Operators deployed successfully"
      
      - name: Run Snowflake SQL Scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python scripts/run_snowflake_sql.py
